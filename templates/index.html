<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Euro NCAP Safety Prediction</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 40px; }
    .container { max-width: 700px; margin: auto; }
    label { display: block; margin-bottom: 8px; font-weight: bold; }
    input, select { width: 100%; padding: 8px; margin-bottom: 16px; }
    button { padding: 10px 16px; font-size: 16px; }
    .result { background: #f4f4f4; padding: 16px; border-radius: 8px; margin-top: 20px; }
    .error { background: #ffe6e6; color: #900; padding: 16px; border-radius: 8px; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Euro NCAP Safety Rating Prediction</h1>
    <p>Enter vehicle and safety feature values to predict the safety category.</p>

    <form method="post">
      <label for="kerb_weight">Kerb weight (kg)</label>
      <input type="number" step="0.1" id="kerb_weight" name="kerb_weight" required>

      {% for feature in bool_fields %}
        <label for="{{ feature }}">{{ feature.replace('_', ' ').title() }}</label>
        <select id="{{ feature }}" name="{{ feature }}" required>
          <option value="yes">Yes</option>
          <option value="no">No</option>
        </select>
      {% endfor %}

      <label for="protocol_version">Protocol version</label>
      <select id="protocol_version" name="protocol_version" required>
        <option value="1">1 (2019 and earlier)</option>
        <option value="2">2 (2020-2021)</option>
        <option value="3">3 (2022 and later)</option>
      </select>

      <button type="submit">Predict</button>
    </form>

    {% if prediction %}
      <div class="result">
        <h2>Prediction</h2>
        <p><strong>Predicted category:</strong> {{ prediction }}</p>
      </div>
    {% endif %}

    {% if error %}
      <div class="error">
        <h2>Error</h2>
        <p>{{ error }}</p>
      </div>
    {% endif %}
  </div>
</body>
</html>
