<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Euro NCAP Safety Prediction</title>
  <style>
    :root {
      color-scheme: light;
      color: #172b4d;
      background: #f2f5f9;
      font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 16px;
      line-height: 1.5;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 24px;
      background: radial-gradient(circle at top, #eef5ff 0%, #f2f5f9 45%, #f2f5f9 100%);
    }

    .container {
      max-width: 1500px;
      margin: auto;
      background: white;
      border-radius: 24px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, 0.08);
      padding: 32px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 2rem;
      letter-spacing: -0.03em;
    }

    p {
      margin: 0 0 28px;
      color: #576574;
      max-width: 760px;
    }

    .top-row {
      display: grid;
      gap: 18px;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      margin-bottom: 24px;
    }

    .field-card {
      background: #f8fbff;
      border: 1px solid #d9e6f7;
      border-radius: 16px;
      padding: 18px;
    }

    label {
      display: block;
      margin-bottom: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      color: #1d3557;
    }

    input,
    select {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid #d8dfe8;
      background: white;
      outline: none;
      font-size: 0.95rem;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    input:focus,
    select:focus {
      border-color: #6c9cff;
      box-shadow: 0 0 0 4px rgba(108, 156, 255, 0.12);
    }

    button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #2855ff;
      color: white;
      border: none;
      border-radius: 14px;
      padding: 14px 24px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
      margin-top: 12px;
    }

    button:hover {
      transform: translateY(-1px);
      background: #1f47d6;
      box-shadow: 0 18px 36px rgba(41, 71, 162, 0.18);
    }

    .result,
    .error {
      border-radius: 18px;
      padding: 20px;
      margin-top: 22px;
      font-size: 0.97rem;
    }

    .result {
      background: #f6fff5;
      border: 1px solid #cdf4d5;
      color: #1d4f1b;
    }

    .error {
      background: #fff2f3;
      border: 1px solid #f3c0c9;
      color: #7a1e22;
    }

    .field-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
    }

    .field-grid > div {
      min-width: 0;
    }

    @media (max-width: 720px) {
      body {
        padding: 16px;
      }

      .container {
        padding: 22px;
      }

      .top-row,
      .field-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Euro NCAP Safety Rating Prediction</h1>
    <p>Enter feature values and click Predict to see the estimated safety category.</p>

    <div class="top-row">
      <div class="field-card">
        <label for="kerb_weight">Kerb weight (kg)</label>
        <input type="number" id="kerb_weight" value="1500" min="500" max="4000" step="1">
      </div>
      <div class="field-card">
        <label for="protocol_version">Protocol version</label>
        <select id="protocol_version">
          <option value="1">1 (2019 and earlier)</option>
          <option value="2">2 (2020 - 2021)</option>
          <option value="3">3 (2022 and later)</option>
        </select>
      </div>
    </div>

    <div class="field-grid" id="boolean-fields"></div>

    <button id="predict">Predict</button>

    <div id="output"></div>
  </div>

  <script>
    const fields = [
      'seat1_knee_airbag',
      'row2_side_chest_airbag',
      'seat1_side_pelvis_airbag',
      'seat3_side_pelvis_airbag',
      'row2_side_pelvis_airbag',
      'seat1_centre_lateral_airbag',
      'seat3_centre_lateral_airbag',
      'seat3_isofix',
      'seat1_isize',
      'seat3_isize',
      'row2_isize',
      'row3_isize',
      'seat3_childdetection',
      'row2_childdetection',
      'has_active_bonnet',
      'has_distraction_detection',
      'has_fatigue_detection',
      'has_lane_assist',
      'has_speed_assist',
      'has_aeb_vru',
      'has_cyclistdoorprevention',
      'has_aeb_m2w',
      'has_aeb_cartocar'
    ];

    const boolFieldsContainer = document.getElementById('boolean-fields');
    fields.forEach(name => {
      const wrapper = document.createElement('div');
      wrapper.className = 'field-card';
      wrapper.innerHTML = `
        <label for="${name}">${name.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase())}</label>
        <select id="${name}">
          <option value="1">Yes</option>
          <option value="0">No</option>
        </select>
      `;
      boolFieldsContainer.appendChild(wrapper);
    });

    let modelData = null;

    fetch('model_export.json')
      .then(res => res.json())
      .then(data => {
        modelData = data;
      })
      .catch(err => {
        document.getElementById('output').innerHTML = `<div class="error">Failed to load model data.</div>`;
        console.error(err);
      });

    function predictSample(inputRow) {
      const vote = { high: 0, low: 0, medium: 0 };
      for (const tree of modelData.trees) {
        let node = 0;
        while (true) {
          const feature = tree.feature[node];
          const left = tree.children_left[node];
          const right = tree.children_right[node];
          if (left === -1 && right === -1) {
            const values = tree.value[node];
            const index = values.indexOf(Math.max(...values));
            vote[modelData.class_names[index]] += 1;
            break;
          }
          if (inputRow[feature] <= tree.threshold[node]) {
            node = left;
          } else {
            node = right;
          }
        }
      }
      return Object.keys(vote).reduce((a, b) => vote[a] > vote[b] ? a : b);
    }

    document.getElementById('predict').addEventListener('click', () => {
      if (!modelData) {
        document.getElementById('output').innerHTML = `<div class="error">Model not loaded yet.</div>`;
        return;
      }

      const values = [
        parseFloat(document.getElementById('kerb_weight').value),
        ...fields.map(name => parseInt(document.getElementById(name).value, 10)),
        parseInt(document.getElementById('protocol_version').value, 10)
      ];

      const prediction = predictSample(values);
      document.getElementById('output').innerHTML = `
        <div class="result">
          <h2>Prediction</h2>
          <p><strong>Safety category:</strong> ${prediction}</p>
        </div>
      `;
    });
  </script>
</body>
</html>
